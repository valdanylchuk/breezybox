version: "1.0.1"
description: "breezy_ssh - The SSH inbound connection component used in BreezyBox, a mini shell for esp32"
url: "https://github.com/valdanylchuk/breezybox/tree/main/src/components/breezy_ssh"
repository: "https://github.com/valdanylchuk/breezybox.git"
documentation: "https://github.com/valdanylchuk/tree/main/src/components/breezy_ssh#readme"
issues: "https://github.com/valdanylchuk/breezybox/issues"

maintainers:
  - "Valentyn Danylchuk <val@danylchuk.com>"

license: "MIT"

targets:
  - esp32
  - esp32c2
  - esp32c3
  - esp32c5
  - esp32c6
  - esp32c61
  - esp32h2
  - esp32h21
  - esp32h4
  - esp32s3
dependencies:
  idf:
    version: ">=5.0"
  david-cermak/libssh:
    version: "^0.11.0"
