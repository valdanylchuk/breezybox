dependencies:
  idf:
    version: ">=5.5.0"

  # Tanmatsu board support: MIPI display, built-in keyboard, power, C6 radio.
  badgeteam/badge-bsp:
    version: "^1.0.0"

  # --- Networking: radio lives on the C6, reached via esp-hosted ---
  # Same stack the native launcher uses on P4. These satisfy breezybox's
  # esp_wifi / esp_http / lwip requirements at link time and provide the
  # Phase-2 radio bring-up (wifi_remote_initialize + esp_hosted custom channel).
  # The C6 firmware is NOT touched; we only talk to the radio it already runs.
  # Versions are intentionally loose -- pin them to match your IDF if needed.
  nicolaielectronics/tanmatsu-wifi:
    version: "*"
  nicolaielectronics/wifi-manager:
    version: "*"
  valdanylchuk/breezybox:
    version: "^1.0.4"
